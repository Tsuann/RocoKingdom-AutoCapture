# ============================================================
# 洛克王国：世界 — 自动捕捉精灵系统 配置文件
# ============================================================

# ---- HDMI 画面采集 ----
capture:
  device: 0                       # /dev/video0
  width: 1920
  height: 1080
  fps: 30                         # 采集帧率 (PC 输出 30Hz 时可设 30)

# ---- 精灵检测 ----
detector:
  # RKNN 模型 (NPU 加速, 优先)
  rknn_model: models/sprite_detector.rknn
  # ONNX 模型 (CPU fallback)
  onnx_model: models/sprite_detector.onnx
  # 检测参数
  input_size: [640, 640]          # YOLO 输入尺寸
  conf_threshold: 0.16            # 置信度阈值 (太低会产生大量误检)
  nms_threshold: 0.4              # NMS IoU 阈值

  # 类别名称 — 当前模型为单类检测（仅小独角兽）
  # 模型输出 5 通道 (cx,cy,w,h,conf)，无分类头
  # 多类模型训练完成后取消注释下方的完整列表
  classes:
    - xiao_dujiaoshou    # 0: 小独角兽（当前单类模型）
  # - huzhu_quan         # 0: 护主犬 (音速犬)
  # - yibei_er           # 1: 伊贝儿
  # - emo_ding           # 2: 恶魔叮
  # - juhua_li           # 3: 菊花梨
  # - gongping_ge        # 4: 公平鸽
  # - ling_hu            # 5: 灵狐
  # - xiao_dujiaoshou    # 6: 小独角兽
  # - xiaoye_yifu        # 7: 小夜/朔夜伊芙

  # 模板匹配 (UI 检测)
  # 验证精灵捕捉结果会用到以下模板 (放入 templates/ 目录):
  #   capture_success.png  — "捕捉成功"弹窗
  #   capture_fail.png     — "捕捉失败"弹窗
  #   battle_end.png       — 战斗结束提示
  #   battle_ui.png        — 战斗界面特征 (技能栏等)
  template:
    match_threshold: 0.7          # 模板匹配阈值
    templates_dir: templates/

# ---- 目标追踪 ----
tracker:
  max_disappeared: 30             # 丢失多少帧后移除追踪器
  kalman:
    process_noise: 0.03           # 过程噪声
    measurement_noise: 0.1        # 测量噪声

# ---- 键鼠控制 ----
controller:
  mouse_sensitivity: 1.0          # 鼠标移动灵敏度
  throw_hold_time: 500            # 长按时间 (ms)
  click_delay: 100                # 点击间隔 (ms)

  # 人类行为模拟 (避免系统检测到脚本化的直来直去操作)
  humanize: true                  # 是否启用人类行为模拟
  humanize_config:
    jitter_amplitude: 3           # 轨迹噪声幅度 (像素)
    overshoot_probability: 0.15   # 过冲概率 (模拟手抖越过目标)
    overshoot_amount: 0.08        # 过冲比例
    speed_variation: 0.3          # 移动速度变化幅度

  # 鼠标瞄准 + 丢球（只支持鼠标，不用键盘）
  aim:
    move_steps: 12                # 平滑移动步数，越少越快
    step_delay: 1                 # 每步间隔 (ms)
    settle_delay: 80              # 到达后稳定 (ms)
    hold_time: 1500               # 蓄力时间 (ms)，蓄力完成后才能开始 PID 修正
    enter_delay: 180               # 按住左键后等待准星进入/归中 (ms)
    parabolic_factor: 0.4          # 抛物线修正系数（二次公式: offset = dist² * pf / sw，越大瞄得越高）
    target_x_ratio: 0.5            # bbox 内瞄准点 X：0.5 = 水平中心
    target_y_ratio: 0.30           # bbox 内瞄准点 Y：0.30 = 靠近头部，0.5 = 身体中心
    fallback_y_offset: -60         # 没有 bbox 时，基于追踪中心向上偏移
    charge_update_interval: 0.20   # 蓄力期间重新检测间隔 (s)
    # PID 对准参数
    pid_kP: 0.70                   # 比例系数（越大越快但可能过冲）
    pid_max_step: 35               # 单步最大移动像素
    pid_min_step: 2                # 小于该像素的修正忽略，减少抖动
    pid_step_wait: 0.02            # 每步检测间隔 (s)
    pid_align_threshold: 12        # 对齐阈值 (像素)，小于此值认为已对准
    pid_max_iters: 70              # 最大迭代次数
    pid_detect_interval: 3         # PID 每多少轮重新检测一次；1 = 每轮都跟踪
    aim_smoothing: 0.65            # 瞄准点 EMA 平滑，越大越稳但响应越慢
    pre_throw_confirmations: 0      # 出球前连续确认次数；0 = 关闭
    pre_throw_interval: 0.06        # 出球前确认间隔 (s)
    pre_throw_threshold: 10         # 出球前确认允许误差 (px)
    pre_throw_max_checks: 8         # 最多确认次数；失败则继续 AIM 不松手
    pre_throw_reaim_rounds: 2       # 确认失败后最多追加微调轮数
    # 丢球模式: "hold_aim" = 长按瞄准→松开丢球(推荐, 更准)
    #           "click"     = 传统点击丢球
    default_mode: hold_aim

  # 视角旋转 (视野内无精灵时自动旋转视角搜索)
  pan:
    amount: 100                   # 单次旋转像素量，越小镜头越慢
    default_direction: right      # 默认旋转方向
    alternate: false              # 固定方向搜索，不左右大幅晃动
    scan_width: 240               # 单轮最多旋转宽度

  # 采集画面 → 游戏画面坐标校准
  calibration:
    offset_x: 0                   # X 偏移 (pixels)
    offset_y: 0                   # Y 偏移 (pixels)
    scale_x: 1.0                  # 水平缩放
    scale_y: 1.0                  # 垂直缩放

  # HID 设备路径 (由 setup_gadget.sh 创建)
  keyboard_device: /dev/hidg0
  mouse_device: /dev/hidg1

  # 键盘按键映射 (使用 controller.py 中的按键名称)
  keymap:
    interact: w                   # W 键 - 交互
    throw_ball: r                 # R 键 - 丢球 (备用，目前用鼠标)
    run: shift                    # Shift - 奔跑
    skill1: "1"                   # 1 键 - 技能1
    skill2: "2"                   # 2 键 - 技能2
    escape: esc                   # ESC
    confirm: enter                # Enter
    focus: x                      # X 键 - 聚能

# ---- 自动化状态机 ----
automation:
  scan_interval: 0.35             # 扫描间隔 (秒)
  max_throw_attempts: 3           # 最大丢球次数
  verify_wait: 1.8                # 丢球后等待结果 (秒)

  # auto/debug-auto 专用检测过滤。debug 模式仍显示原始模型输出，方便对比。
  detection_filter:
    min_confidence: 0.16           # 保持与 detector.conf_threshold 一致，避免 auto 漏检更多
    min_area_ratio: 0.00012        # 过滤极小噪点
    max_area_ratio: 0.012          # 过滤大面积 UI/背景误检
    min_aspect: 0.30               # bbox 宽高比下限
    max_aspect: 3.2                # bbox 宽高比上限

  target_priority:                # 目标优先级 (按物种类别)
    - huzhu_quan
    - yibei_er
    - emo_ding
    - juhua_li
    - gongping_ge
    - ling_hu
    - xiao_dujiaoshou
    - xiaoye_yifu

  # 视角自动旋转 (视野内无精灵时)
  pan:
    enabled: true                 # 是否启用自动旋转视角
    empty_scans_before_pan: 5     # 连续多少次空扫描后旋转视角
    direction: right              # 固定扫描方向
    step_pixels: 80               # 每一步转动像素，越小越稳
    step_delay: 0.15              # 每一步后等待画面稳定 (s)
    max_steps: 6                  # 单轮最多扫描步数；检测到精灵会立刻停止
    hold_during_search: true      # 搜索自转时保持长按，发现目标后更快出球

# ---- 热键 (通过键盘监听) ----
hotkeys:
  start: f2                       # 启动自动捕捉
  pause: f3                       # 暂停/恢复
  exit: f4                        # 退出程序

# ---- 日志 ----
logging:
  level: INFO                     # DEBUG, INFO, WARNING, ERROR
  log_dir: logs/
  save_screenshots: false          # 是否保存检测截图
